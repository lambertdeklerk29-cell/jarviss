<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>J.A.R.V.I.S.</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Share+Tech+Mono&display=swap');

  :root{
    --bg: #030a0d;
    --cyan: #4bd8e6;
    --cyan-bright: #a6f3ff;
    --cyan-dim: #145a66;
    --amber: #ff9d3d;
    --danger: #ff4d4d;
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0; padding:0; height:100%;
    background: radial-gradient(ellipse at center, #061418 0%, #020608 70%, #000000 100%);
    color: var(--cyan-bright);
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
  }

  .scanlines{
    position: fixed; inset:0; pointer-events:none; z-index: 50;
    background: repeating-linear-gradient(
      to bottom,
      rgba(75,216,230,0.025) 0px,
      rgba(75,216,230,0.025) 1px,
      transparent 2px,
      transparent 3px
    );
    mix-blend-mode: screen;
  }

  .vignette{
    position: fixed; inset:0; pointer-events:none; z-index: 49;
    box-shadow: inset 0 0 180px rgba(0,0,0,0.85);
  }

  .app{
    position: relative;
    width: 100%; height: 100vh;
    display: flex; flex-direction: column;
    padding: 22px 28px;
  }

  /* header */
  header{
    display:flex; justify-content: space-between; align-items: flex-start;
    letter-spacing: 3px;
  }
  .brand{
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 22px;
    color: var(--cyan-bright);
    text-shadow: 0 0 12px rgba(75,216,230,0.6);
  }
  .brand small{
    display:block;
    font-family: 'Share Tech Mono', monospace;
    font-weight: 400;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--cyan-dim);
    margin-top: 2px;
  }
  .status-cluster{
    text-align: right;
    font-size: 11px;
    color: var(--cyan-dim);
    line-height: 1.6;
  }
  .status-cluster .dot{
    display:inline-block; width:6px; height:6px; border-radius:50%;
    background: var(--cyan); margin-right:6px;
    box-shadow: 0 0 6px var(--cyan);
    animation: blink 2.4s infinite ease-in-out;
  }
  @keyframes blink{ 0%,100%{opacity:1} 50%{opacity:.3} }

  /* corner brackets */
  .bracket{ position:absolute; width:26px; height:26px; border-color: var(--cyan-dim); opacity:.8; }
  .bracket.tl{ top:14px; left:14px; border-top:2px solid; border-left:2px solid; }
  .bracket.tr{ top:14px; right:14px; border-top:2px solid; border-right:2px solid; }
  .bracket.bl{ bottom:14px; left:14px; border-bottom:2px solid; border-left:2px solid; }
  .bracket.br{ bottom:14px; right:14px; border-bottom:2px solid; border-right:2px solid; }

  /* main core */
  main{
    flex: 1;
    display:flex; flex-direction: column; align-items:center; justify-content:center;
    gap: 18px;
    position: relative;
  }

  .core-wrap{
    position: relative;
    width: 260px; height: 260px;
    display:flex; align-items:center; justify-content:center;
  }

  .ring{
    position:absolute; border-radius:50%;
    border: 1px solid var(--cyan-dim);
  }
  .ring.r1{ width:100%; height:100%; animation: spin 18s linear infinite; border-style: dashed; opacity:.5;}
  .ring.r2{ width:78%; height:78%; animation: spin 12s linear infinite reverse; opacity:.7;}
  .ring.r3{ width:58%; height:58%; border-color: var(--cyan); opacity:.9; }
  @keyframes spin{ from{transform:rotate(0)} to{transform:rotate(360deg)} }

  .core{
    width: 46%; height:46%;
    border-radius:50%;
    background: radial-gradient(circle at 40% 35%, var(--cyan-bright), var(--cyan) 40%, var(--cyan-dim) 75%, transparent 100%);
    box-shadow: 0 0 40px 6px rgba(75,216,230,0.55), 0 0 90px 20px rgba(75,216,230,0.15);
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .core.listening{ animation: pulseListen 1s ease-in-out infinite; }
  .core.thinking{ animation: pulseThink 0.6s ease-in-out infinite; }
  .core.speaking{ animation: pulseSpeak 0.35s ease-in-out infinite; }
  @keyframes pulseListen{ 0%,100%{ transform: scale(1);} 50%{ transform: scale(1.08);} }
  @keyframes pulseThink{ 0%,100%{ transform: scale(0.96);} 50%{ transform: scale(1.04);} }
  @keyframes pulseSpeak{ 0%,100%{ transform: scale(1);} 50%{ transform: scale(1.12);} }

  .state-label{
    font-family:'Orbitron', sans-serif;
    letter-spacing: 5px;
    font-size: 12px;
    color: var(--cyan);
    text-transform: uppercase;
    min-height: 16px;
  }

  /* transcript */
  .transcript{
    width: min(680px, 90vw);
    min-height: 90px;
    max-height: 200px;
    overflow-y: auto;
    text-align:center;
    font-size: 15px;
    line-height: 1.6;
    color: var(--cyan-bright);
    padding: 4px 8px;
  }
  .transcript .line{ margin-bottom: 10px; opacity: 0; animation: fadeIn .4s forwards; }
  @keyframes fadeIn{ to{ opacity:1; } }
  .transcript .you{ color: var(--amber); }
  .transcript .you::before{ content: "YOU  ▸  "; color: var(--amber); opacity:.7; font-size:11px; }
  .transcript .jarvis::before{ content: "JARVIS  ▸  "; color: var(--cyan-dim); font-size:11px; }

  /* controls */
  .controls{
    display:flex; align-items:center; gap: 16px;
    padding-bottom: 6px;
  }

  .mic-btn{
    width: 68px; height:68px; border-radius:50%;
    border: 2px solid var(--cyan);
    background: rgba(75,216,230,0.06);
    color: var(--cyan-bright);
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    font-size: 24px;
    box-shadow: 0 0 18px rgba(75,216,230,0.25);
    transition: all .2s ease;
  }
  .mic-btn:hover{ background: rgba(75,216,230,0.15); }
  .mic-btn.active{
    border-color: var(--danger);
    color: var(--danger);
    box-shadow: 0 0 22px rgba(255,77,77,0.4);
  }
  .mic-btn:disabled{ opacity:.4; cursor:not-allowed; }

  .text-input-row{
    display:flex; gap:10px; width: min(680px, 90vw);
  }
  .text-input-row input{
    flex:1;
    background: rgba(75,216,230,0.04);
    border: 1px solid var(--cyan-dim);
    color: var(--cyan-bright);
    padding: 10px 14px;
    font-family:'Share Tech Mono', monospace;
    font-size: 13px;
    border-radius: 3px;
    outline:none;
  }
  .text-input-row input:focus{ border-color: var(--cyan); }
  .text-input-row button{
    background: transparent;
    border: 1px solid var(--cyan-dim);
    color: var(--cyan);
    padding: 0 18px;
    font-family:'Orbitron', sans-serif;
    letter-spacing:2px;
    font-size: 11px;
    cursor:pointer;
    border-radius: 3px;
  }
  .text-input-row button:hover{ border-color: var(--cyan); background: rgba(75,216,230,0.08); }

  .hint{
    font-size: 10px; letter-spacing:1.5px; color: var(--cyan-dim); text-transform:uppercase;
  }

  ::-webkit-scrollbar{ width:5px; }
  ::-webkit-scrollbar-thumb{ background: var(--cyan-dim); border-radius:4px; }
</style>
<script src="https://js.puter.com/v2/"></script>
</head>
<body>

<div class="scanlines"></div>
<div class="vignette"></div>

<div class="app">
  <div class="bracket tl"></div>
  <div class="bracket tr"></div>
  <div class="bracket bl"></div>
  <div class="bracket br"></div>

  <header>
    <div class="brand">J.A.R.V.I.S.
      <small>JUST A RATHER VERY INTELLIGENT SYSTEM</small>
    </div>
    <div class="status-cluster">
      <div><span class="dot"></span>SYSTEMS ONLINE</div>
      <div id="clock">00:00:00</div>
    </div>
  </header>

  <main>
    <div class="core-wrap">
      <div class="ring r1"></div>
      <div class="ring r2"></div>
      <div class="ring r3"></div>
      <div class="core" id="core"></div>
    </div>
    <div class="state-label" id="stateLabel">STANDING BY</div>

    <div class="transcript" id="transcript"></div>

    <div class="controls">
      <button class="mic-btn" id="micBtn" title="Hold to talk / click to toggle">🎤</button>
    </div>
    <div class="text-input-row">
      <input type="text" id="textInput" placeholder="...or type a command, sir">
      <button id="sendBtn">SEND</button>
    </div>
    <div class="hint" id="hint">Click the mic and speak, or type below</div>
  </main>
</div>

<script>
// ---------- Clock ----------
function tickClock(){
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-GB');
}
setInterval(tickClock, 1000); tickClock();

// ---------- Elements ----------
const core = document.getElementById('core');
const stateLabel = document.getElementById('stateLabel');
const transcript = document.getElementById('transcript');
const micBtn = document.getElementById('micBtn');
const textInput = document.getElementById('textInput');
const sendBtn = document.getElementById('sendBtn');
const hint = document.getElementById('hint');

let conversationHistory = [];
let isListening = false;

function setState(state){
  core.className = 'core';
  if(state) core.classList.add(state);
  const labels = {
    listening: 'LISTENING...',
    thinking: 'PROCESSING...',
    speaking: 'RESPONDING...',
    idle: 'STANDING BY'
  };
  stateLabel.textContent = labels[state] || labels.idle;
}

function addLine(text, who){
  const div = document.createElement('div');
  div.className = 'line ' + who;
  div.textContent = text;
  transcript.appendChild(div);
  transcript.scrollTop = transcript.scrollHeight;
}

// ---------- Speech Recognition (input) ----------
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let recognitionSupported = !!SpeechRecognition;

if(recognitionSupported){
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-US';

  recognition.onresult = (event) => {
    const text = event.results[0][0].transcript;
    handleUserInput(text);
  };

  recognition.onerror = (event) => {
    console.error('Speech recognition error', event.error);
    setState('idle');
    micBtn.classList.remove('active');
    isListening = false;
    hint.textContent = 'Mic error: ' + event.error + ' — try typing instead';
  };

  recognition.onend = () => {
    isListening = false;
    micBtn.classList.remove('active');
    if(stateLabel.textContent === 'LISTENING...') setState('idle');
  };
} else {
  micBtn.disabled = true;
  hint.textContent = 'Voice input not supported in this browser — please type your command';
}

micBtn.addEventListener('click', () => {
  if(!recognitionSupported) return;
  if(isListening){
    recognition.stop();
    isListening = false;
    micBtn.classList.remove('active');
    setState('idle');
  } else {
    try{
      recognition.start();
      isListening = true;
      micBtn.classList.add('active');
      setState('listening');
      hint.textContent = 'Listening... speak now';
    }catch(e){
      console.error(e);
    }
  }
});

// ---------- Text input ----------
sendBtn.addEventListener('click', submitTextInput);
textInput.addEventListener('keydown', (e) => {
  if(e.key === 'Enter') submitTextInput();
});
function submitTextInput(){
  const val = textInput.value.trim();
  if(!val) return;
  textInput.value = '';
  handleUserInput(val);
}

// ---------- Text-to-Speech (output) ----------
function speak(text){
  return new Promise((resolve) => {
    if(!window.speechSynthesis){ resolve(); return; }
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = 1.0;
    utter.pitch = 0.85;

    const voices = window.speechSynthesis.getVoices();
    const preferred = voices.find(v => /male|daniel|david|google uk english male/i.test(v.name));
    if(preferred) utter.voice = preferred;

    setState('speaking');
    utter.onend = () => { setState('idle'); resolve(); };
    utter.onerror = () => { setState('idle'); resolve(); };
    window.speechSynthesis.speak(utter);
  });
}

// ---------- Core "brain" call ----------
async function handleUserInput(text){
  addLine(text, 'you');
  hint.textContent = '';
  setState('thinking');

  conversationHistory.push({ role: 'user', content: text });

  try{
    if(typeof puter === 'undefined' || !puter.ai || !puter.ai.chat){
      throw new Error('puter-not-loaded');
    }

    const systemPrompt = "You are JARVIS, a witty, hyper-competent AI assistant in the style of Tony Stark's AI. Address the user as 'sir' occasionally. Keep responses concise (1-4 sentences) since they will be spoken aloud, unless detail is explicitly requested.";

    // Build message list with system prompt prepended as context
    const messages = [
      { role: 'system', content: systemPrompt },
      ...conversationHistory
    ];

    const response = await puter.ai.chat(messages, { model: 'claude-sonnet-4-6' });

    // puter.ai.chat can return a string directly, or an object with .message.content
    let reply;
    if(typeof response === 'string'){
      reply = response;
    } else if(response?.message?.content){
      reply = Array.isArray(response.message.content)
        ? response.message.content.map(b => b.text || '').join('\n')
        : response.message.content;
    } else if(response?.text){
      reply = response.text;
    } else {
      reply = String(response);
    }
    reply = (reply || '').trim() || "Apologies, sir, I didn't catch that.";

    conversationHistory.push({ role: 'assistant', content: reply });
    addLine(reply, 'jarvis');
    await speak(reply);
  }catch(err){
    console.error(err);
    addLine('Connection error. Please try again, sir.', 'jarvis');
    setState('idle');
  }
}

// Load voices (some browsers load async)
if(window.speechSynthesis){
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

// Greeting
setTimeout(() => {
  addLine("All systems online. How can I help you, sir?", 'jarvis');
}, 500);
</script>

</body>
</html>
